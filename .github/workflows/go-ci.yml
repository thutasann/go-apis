name: Go CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Go projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache: false

      - name: Discover changed Go modules
        id: modules
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            base=""
            head="${GITHUB_SHA}"
          else
            base="${{ github.event.before }}"
            head="${GITHUB_SHA}"
          fi

          if [ -n "${base}" ]; then
            echo "Detecting changes between ${base} and ${head}"
            mapfile -t changed_files < <(git diff --name-only "${base}" "${head}")
          else
            echo "No previous commit available; using all files from ${head}"
            mapfile -t changed_files < <(git ls-tree -r --name-only "${head}")
          fi

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "Changed files: none"
          else
            printf 'Changed files:\n'
            printf ' - %s\n' "${changed_files[@]}"
          fi

          mapfile -t all_modules < <(find . -name go.mod -not -path '*/vendor/*' -exec dirname {} \; | sed 's#^\./##' | sort)
          mapfile -t modules_by_depth < <(printf '%s\n' "${all_modules[@]}" | awk '{ print length, $0 }' | sort -rn | cut -d' ' -f2-)

          declare -A selected_modules=()

          for file in "${changed_files[@]}"; do
            for module in "${modules_by_depth[@]}"; do
              if [ "${file}" = "${module}" ] || [[ "${file}" == "${module}/"* ]]; then
                selected_modules["${module}"]=1
                break
              fi
            done
          done

          if [ "${#selected_modules[@]}" -eq 0 ]; then
            modules=()
          else
            mapfile -t modules < <(printf '%s\n' "${!selected_modules[@]}" | sort)
          fi

          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No changed Go modules found."
            echo "has_modules=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf 'Changed Go modules:\n'
          printf ' - %s\n' "${modules[@]}"

          {
            echo "has_modules=true"
            echo "modules<<EOF"
            printf '%s\n' "${modules[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Install Linux build dependencies
        if: steps.modules.outputs.has_modules == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            pkg-config

      - name: Build modules
        if: steps.modules.outputs.has_modules == 'true'
        shell: bash
        env:
          CGO_ENABLED: "1"
          MODULES: ${{ steps.modules.outputs.modules }}
        run: |
          set -euo pipefail

          mapfile -t modules <<< "${MODULES}"

          for module in "${modules[@]}"; do
            echo "::group::${module}"
            (
              cd "${module}"
              echo "Building changed module: ${module}"
              echo "Downloading module dependencies"
              go mod download
              mkdir -p "${RUNNER_TEMP}/go-build-bins"

              while IFS=$'\t' read -r import_path package_name package_dir go_files; do
                if [ "${go_files}" = "[]" ]; then
                  echo "Skipping ${import_path}: no non-test Go files"
                  continue
                fi

                if [ "${package_name}" != "main" ]; then
                  echo "Building package ${import_path}"
                  go build "${import_path}"
                  continue
                fi

                if grep -R --include='*.go' --exclude='*_test.go' -q 'func[[:space:]]\+main[[:space:]]*(' "${package_dir}"; then
                  output_name="$(echo "${import_path}" | tr '/:@' '___')"
                  echo "Building command ${import_path} -> ${RUNNER_TEMP}/go-build-bins/${output_name}"
                  go build -o "${RUNNER_TEMP}/go-build-bins/${output_name}" "${import_path}"
                else
                  echo "Skipping ${import_path}: package main has no main function"
                fi
              done < <(go list -f '{{.ImportPath}}{{"\t"}}{{.Name}}{{"\t"}}{{.Dir}}{{"\t"}}{{.GoFiles}}' ./...)

              echo "Finished building ${module}"
            )
            echo "::endgroup::"
          done
