name: Go CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Go projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            pkg-config

      - name: Discover Go modules
        id: modules
        shell: bash
        run: |
          mapfile -t modules < <(find . -name go.mod -not -path '*/vendor/*' -exec dirname {} \; | sort)

          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No Go modules found."
            exit 1
          fi

          printf 'Found %d Go modules:\n' "${#modules[@]}"
          printf ' - %s\n' "${modules[@]}"

      - name: Build modules
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail

          mapfile -t modules < <(find . -name go.mod -not -path '*/vendor/*' -exec dirname {} \; | sort)

          for module in "${modules[@]}"; do
            echo "::group::${module}"
            (
              cd "${module}"
              go mod download
              mkdir -p "${RUNNER_TEMP}/go-build-bins"

              while IFS=$'\t' read -r import_path package_name package_dir go_files; do
                if [ "${go_files}" = "[]" ]; then
                  echo "Skipping ${import_path}: no non-test Go files"
                  continue
                fi

                if [ "${package_name}" != "main" ]; then
                  go build "${import_path}"
                  continue
                fi

                if grep -R --include='*.go' --exclude='*_test.go' -q 'func[[:space:]]\+main[[:space:]]*(' "${package_dir}"; then
                  output_name="$(echo "${import_path}" | tr '/:@' '___')"
                  go build -o "${RUNNER_TEMP}/go-build-bins/${output_name}" "${import_path}"
                else
                  echo "Skipping ${import_path}: package main has no main function"
                fi
              done < <(go list -f '{{.ImportPath}}{{"\t"}}{{.Name}}{{"\t"}}{{.Dir}}{{"\t"}}{{.GoFiles}}' ./...)
            )
            echo "::endgroup::"
          done
