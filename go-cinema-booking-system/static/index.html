<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Booking</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface-hover: #252525;
        --border: #333;
        --text: #e0e0e0;
        --text-muted: #888;
        --available: #2a2a2a;
        --available-hover: #3a3a3a;
        --held-mine: #d4a017;
        --held-other: #e06c00;
        --confirmed: #c0392b;
        --accent: #4fc3f7;
        --danger: #e74c3c;
        --font: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 2rem;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .user-id {
        font-size: 0.75rem;
        color: var(--text-muted);
        background: var(--surface);
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
      }

      .movies {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .movie-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.2rem 1.6rem;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        min-width: 180px;
      }

      .movie-card:hover {
        background: var(--surface-hover);
        border-color: var(--accent);
      }

      .movie-card.selected {
        border-color: var(--accent);
        background: var(--surface-hover);
      }

      .movie-card h3 {
        font-size: 1rem;
        margin-bottom: 0.4rem;
      }

      .movie-card p {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .content {
        display: flex;
        gap: 2rem;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .screen-area {
        flex: 1;
        min-width: 300px;
      }

      .screen-label {
        text-align: center;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--text-muted);
        margin-bottom: 0.6rem;
      }

      .screen-bar {
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        border-radius: 2px;
        margin: 0 2rem 1.5rem;
      }

      .seat-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .seat-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .row-label {
        width: 1.5rem;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-align: center;
      }

      .seat {
        width: 36px;
        height: 32px;
        border-radius: 6px 6px 3px 3px;
        border: none;
        cursor: pointer;
        font-size: 0.65rem;
        font-family: var(--font);
        color: var(--text-muted);
        background: var(--available);
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .seat:hover:not(.seat--held-mine):not(.seat--held-other):not(
          .seat--confirmed
        ) {
        background: var(--available-hover);
        transform: scale(1.08);
      }

      .seat--held-mine {
        background: var(--held-mine);
        color: #000;
        cursor: default;
      }

      .seat--held-other {
        background: var(--held-other);
        color: #fff;
        cursor: not-allowed;
      }

      .seat--confirmed {
        background: var(--confirmed);
        color: #fff;
        cursor: not-allowed;
      }

      .legend {
        display: flex;
        gap: 1.2rem;
        justify-content: center;
        margin-top: 1.5rem;
        flex-wrap: wrap;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.7rem;
        color: var(--text-muted);
      }

      .legend-swatch {
        width: 14px;
        height: 12px;
        border-radius: 3px 3px 2px 2px;
      }

      .checkout {
        width: 280px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.4rem;
      }

      .checkout h3 {
        font-size: 0.85rem;
        margin-bottom: 1rem;
        color: var(--accent);
      }

      .checkout-info {
        font-size: 0.8rem;
        margin-bottom: 0.6rem;
      }

      .checkout-info span {
        color: var(--text-muted);
      }

      .timer {
        font-size: 1.8rem;
        font-weight: 700;
        text-align: center;
        margin: 1rem 0;
        color: var(--held-mine);
        transition: color 0.3s;
      }

      .timer.urgent {
        color: var(--danger);
      }

      .checkout-buttons {
        display: flex;
        gap: 0.6rem;
      }

      .btn {
        flex: 1;
        padding: 0.6rem;
        border: none;
        border-radius: 6px;
        font-family: var(--font);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.85;
      }

      .btn--confirm {
        background: #27ae60;
        color: #fff;
      }

      .btn--release {
        background: var(--danger);
        color: #fff;
      }

      .status-msg {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .status-msg.success {
        color: #27ae60;
      }
      .status-msg.error {
        color: var(--danger);
      }

      .empty-state {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        padding: 3rem 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cinema Booking</h1>
      <div class="user-id" id="userBadge"></div>
    </header>

    <div class="movies" id="movieList"></div>

    <div class="content" id="mainContent" style="display: none">
      <div class="screen-area">
        <div class="screen-label">Screen</div>
        <div class="screen-bar"></div>
        <div class="seat-grid" id="seatGrid"></div>
        <div class="legend">
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--available)"
            ></div>
            Available
          </div>
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--held-mine)"
            ></div>
            Your hold
          </div>
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--held-other)"
            ></div>
            Other hold
          </div>
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--confirmed)"
            ></div>
            Confirmed
          </div>
        </div>
      </div>
      <div id="checkoutArea"></div>
    </div>

    <script>
      (function () {
        const userID = crypto.randomUUID().replace(/-/g, "").slice(0, 12);
        document.getElementById("userBadge").textContent = "user: " + userID;

        let movies = [];
        let selectedMovie = null;
        let activeSession = null; // { sessionID, movieID, seatID, expiresAt }
        let pollInterval = null;
        let timerInterval = null;

        // --- API helpers ---

        function api(method, path, body) {
          const opts = {
            method,
            headers: { "Content-Type": "application/json" },
          };
          if (body) opts.body = JSON.stringify(body);
          return fetch(path, opts).then(function (r) {
            if (r.status === 204) return null;
            return r.json().then(function (data) {
              if (!r.ok) throw new Error(data.error || "request failed");
              return data;
            });
          });
        }

        // --- Movie list ---

        function loadMovies() {
          api("GET", "/movies").then(function (data) {
            movies = data;
            renderMovies();
          });
        }

        function renderMovies() {
          var container = document.getElementById("movieList");
          container.innerHTML = "";
          movies.forEach(function (m) {
            var card = document.createElement("div");
            card.className =
              "movie-card" +
              (selectedMovie && selectedMovie.id === m.id ? " selected" : "");
            card.innerHTML =
              "<h3>" +
              escapeHtml(m.title) +
              "</h3><p>" +
              m.rows +
              " rows &times; " +
              m.seats_per_row +
              " seats</p>";
            card.addEventListener("click", function () {
              selectMovie(m);
            });
            container.appendChild(card);
          });
        }

        function releaseActiveSession() {
          if (!activeSession) return Promise.resolve();
          var sid = activeSession.sessionID;
          clearTimerInterval();
          activeSession = null;
          document.getElementById("checkoutArea").innerHTML = "";
          return api("DELETE", "/sessions/" + sid, { user_id: userID }).catch(
            function () {},
          );
        }

        function selectMovie(movie) {
          releaseActiveSession();
          selectedMovie = movie;
          renderMovies();
          document.getElementById("mainContent").style.display = "flex";
          document.getElementById("checkoutArea").innerHTML = "";
          fetchSeats();
          startPolling();
        }

        // --- Seat grid ---

        function fetchSeats() {
          if (!selectedMovie) return;
          api("GET", "/movies/" + selectedMovie.id + "/seats").then(
            function (seats) {
              renderGrid(seats);
            },
          );
        }

        function renderGrid(seatStatuses) {
          var grid = document.getElementById("seatGrid");
          grid.innerHTML = "";
          var statusMap = {};
          seatStatuses.forEach(function (s) {
            statusMap[s.seat_id] = s;
          });

          var rowLabels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
          for (var r = 0; r < selectedMovie.rows; r++) {
            var rowDiv = document.createElement("div");
            rowDiv.className = "seat-row";
            var label = document.createElement("div");
            label.className = "row-label";
            label.textContent = rowLabels[r];
            rowDiv.appendChild(label);

            for (var s = 1; s <= selectedMovie.seats_per_row; s++) {
              var seatID = rowLabels[r] + s;
              var btn = document.createElement("button");
              btn.className = "seat";
              btn.textContent = s;
              btn.dataset.seatId = seatID;

              var info = statusMap[seatID];
              if (info) {
                if (info.confirmed) {
                  btn.classList.add("seat--confirmed");
                } else if (info.booked && info.user_id === userID) {
                  btn.classList.add("seat--held-mine");
                } else if (info.booked) {
                  btn.classList.add("seat--held-other");
                }
              }

              (function (id) {
                btn.addEventListener("click", function () {
                  holdSeat(id);
                });
              })(seatID);

              rowDiv.appendChild(btn);
            }

            var labelRight = document.createElement("div");
            labelRight.className = "row-label";
            labelRight.textContent = rowLabels[r];
            rowDiv.appendChild(labelRight);
            grid.appendChild(rowDiv);
          }
        }

        // --- Hold / Confirm / Release ---

        function holdSeat(seatID) {
          if (activeSession) return; // already holding a seat
          api(
            "POST",
            "/movies/" + selectedMovie.id + "/seats/" + seatID + "/hold",
            { user_id: userID },
          )
            .then(function (data) {
              activeSession = {
                sessionID: data.session_id,
                movieID: data.movie_id,
                seatID: data.seat_id,
                expiresAt: new Date(data.expires_at),
              };
              fetchSeats();
              renderCheckout();
              startTimer();
            })
            .catch(function (err) {
              showCheckoutStatus(err.message, "error");
            });
        }

        function confirmSeat() {
          if (!activeSession) return;
          api("PUT", "/sessions/" + activeSession.sessionID + "/confirm", {
            user_id: userID,
          })
            .then(function () {
              clearTimerInterval();
              activeSession = null;
              fetchSeats();
              showCheckoutStatus("Confirmed!", "success");
            })
            .catch(function (err) {
              showCheckoutStatus(err.message, "error");
            });
        }

        function releaseSeat() {
          if (!activeSession) return;
          api("DELETE", "/sessions/" + activeSession.sessionID, {
            user_id: userID,
          })
            .then(function () {
              clearTimerInterval();
              activeSession = null;
              fetchSeats();
              document.getElementById("checkoutArea").innerHTML = "";
            })
            .catch(function (err) {
              showCheckoutStatus(err.message, "error");
            });
        }

        // --- Checkout panel ---

        function renderCheckout() {
          if (!activeSession) return;
          var area = document.getElementById("checkoutArea");
          area.innerHTML =
            '<div class="checkout">' +
            "<h3>Checkout</h3>" +
            '<div class="checkout-info"><span>Seat:</span> ' +
            escapeHtml(activeSession.seatID) +
            "</div>" +
            '<div class="checkout-info"><span>Movie:</span> ' +
            escapeHtml(activeSession.movieID) +
            "</div>" +
            '<div class="checkout-info"><span>Session:</span> ' +
            activeSession.sessionID.slice(0, 8) +
            "&hellip;</div>" +
            '<div class="timer" id="timer">--:--</div>' +
            '<div class="checkout-buttons">' +
            '<button class="btn btn--confirm" id="btnConfirm">Confirm</button>' +
            '<button class="btn btn--release" id="btnRelease">Release</button>' +
            "</div>" +
            '<div id="checkoutStatus"></div>' +
            "</div>";
          document
            .getElementById("btnConfirm")
            .addEventListener("click", confirmSeat);
          document
            .getElementById("btnRelease")
            .addEventListener("click", releaseSeat);
        }

        function showCheckoutStatus(msg, type) {
          var area = document.getElementById("checkoutArea");
          area.innerHTML =
            '<div class="checkout">' +
            '<div class="status-msg ' +
            type +
            '">' +
            escapeHtml(msg) +
            "</div>" +
            "</div>";
          setTimeout(function () {
            if (!activeSession) area.innerHTML = "";
          }, 3000);
        }

        // --- Timer ---

        function startTimer() {
          clearTimerInterval();
          updateTimer();
          timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
          if (!activeSession) {
            clearTimerInterval();
            return;
          }
          var el = document.getElementById("timer");
          if (!el) return;
          var remaining = Math.max(
            0,
            Math.floor((activeSession.expiresAt - Date.now()) / 1000),
          );
          var mins = Math.floor(remaining / 60);
          var secs = remaining % 60;
          el.textContent =
            String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");

          if (remaining < 60) {
            el.classList.add("urgent");
          } else {
            el.classList.remove("urgent");
          }

          if (remaining <= 0) {
            clearTimerInterval();
            activeSession = null;
            fetchSeats();
            showCheckoutStatus("Hold expired", "error");
          }
        }

        function clearTimerInterval() {
          if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
          }
        }

        // --- Polling ---

        function startPolling() {
          if (pollInterval) clearInterval(pollInterval);
          pollInterval = setInterval(fetchSeats, 2000);
        }

        // --- Util ---

        function escapeHtml(str) {
          var div = document.createElement("div");
          div.textContent = str;
          return div.innerHTML;
        }

        // --- Init ---

        loadMovies();
      })();
    </script>
  </body>
</html>
